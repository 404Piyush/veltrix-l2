version: '3.8'

services:
  # Mock Ethereum L1
  l1:
    image: ghcr.io/foundry-rs/foundry:latest
    ports:
      - "8545:8545"
    entrypoint: anvil
    command: --host 0.0.0.0 --block-time 12 --chain-id 31337

  # Veltrix L2 Execution Engine
  op-geth:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:latest
    depends_on:
      - l1
    ports:
      - "9545:8545" # L2 RPC
      - "8551:8551" # Engine API
    volumes:
      - ./jwt.txt:/config/jwt.txt
      - geth_data:/data
    environment:
      - GETH_DATADIR=/data
      - GETH_AUTHRPC_JWTSECRET=/config/jwt.txt
      - GETH_HTTP=true
      - GETH_HTTP_ADDR=0.0.0.0
      - GETH_HTTP_PORT=8545
      - GETH_HTTP_API=eth,net,web3,debug,admin
      - GETH_WS=true
      - GETH_WS_ADDR=0.0.0.0
      - GETH_WS_API=eth,net,web3,debug,admin
      - GETH_AUTHRPC_ADDR=0.0.0.0
      - GETH_AUTHRPC_PORT=8551
      - GETH_AUTHRPC_VHOSTS=*

  # Veltrix L2 Consensus Layer
  op-node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:latest
    depends_on:
      - l1
      - op-geth
    ports:
      - "7545:9545" # Rollup RPC
    volumes:
      - ./jwt.txt:/config/jwt.txt
      - /Users/piyushutkar/Desktop/Veltrix/configs:/config
    command: >
      op-node
      --rollup.config=/config/rollup.json
      --l1=http://l1:8545
      --l2=http://op-geth:8551
      --l2.jwt-secret=/config/jwt.txt
    environment:
      - OP_NODE_RPC_ADDR=0.0.0.0
      - OP_NODE_RPC_PORT=9545

  # Veltrix L2 Batcher (Posts data to L1)
  op-batcher:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-batcher:latest
    depends_on:
      - l1
      - op-node
    environment:
      - OP_BATCHER_L1_ETH_RPC=http://l1:8545
      - OP_BATCHER_L2_ETH_RPC=http://op-geth:8545
      - OP_BATCHER_ROLLUP_RPC=http://op-node:9545
      - OP_BATCHER_POLL_INTERVAL=1s
      - OP_BATCHER_SUB_SAFETY_MARGIN=4
      - OP_BATCHER_NUM_CONFIRMATIONS=1
      - OP_BATCHER_PRIVATE_KEY=0x9fe6e142e70a998a22df54fc8f0adbe30635b15315233369bd09171735379508 # Default Anvil Key #1

  # Veltrix L2 Proposer (Posts state roots to L1)
  op-proposer:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-proposer:latest
    depends_on:
      - l1
      - op-node
    environment:
      - OP_PROPOSER_L1_ETH_RPC=http://l1:8545
      - OP_PROPOSER_ROLLUP_RPC=http://op-node:9545
      - OP_PROPOSER_POLL_INTERVAL=12s
      - OP_PROPOSER_PRIVATE_KEY=0x9fe6e142e70a998a22df54fc8f0adbe30635b15315233369bd09171735379508 # Default Anvil Key #2

volumes:
  geth_data:

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
